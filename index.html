<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pâtisserie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F5F5F0;color:#1A1A1A;padding:1.5rem}
.dash{max-width:820px;margin:0 auto}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem}
.topbar h1{font-size:22px;font-weight:700;color:#1A1A1A}
.topbar .date{font-size:13px;color:#888;margin-top:3px}
.btn-refresh{background:#D85A30;color:white;border:none;padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:background .15s}
.btn-refresh:hover{background:#b84a22}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:white;border-radius:12px;padding:16px 18px;border:1px solid #EBEBEB;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-label{font-size:12px;color:#999;margin-bottom:6px;font-weight:500}
.stat-val{font-size:26px;font-weight:700;color:#1A1A1A}
.stat-val.coral{color:#D85A30}
.section{margin-bottom:1.8rem}
.section-title{font-size:11px;font-weight:700;color:#999;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.order-card{background:white;border:1px solid #EBEBEB;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:box-shadow .15s}
.order-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.order-left{display:flex;flex-direction:column;align-items:center;min-width:50px}
.order-time{font-size:13px;font-weight:700;color:#D85A30}
.order-date{font-size:11px;color:#999;margin-top:3px}
.order-info{flex:1;min-width:0}
.order-name{font-size:14px;font-weight:600;color:#1A1A1A}
.order-prod{font-size:12px;color:#888;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-sel{font-size:12px;border:1px solid #DDD;border-radius:8px;padding:6px 10px;background:white;cursor:pointer;font-weight:600;flex-shrink:0;outline:none}
.status-sel.encours{background:#FFF8E6;color:#B07800;border-color:#F0C040}
.status-sel.pret{background:#E8F5E9;color:#2E7D32;border-color:#66BB6A}
.status-sel.livre{background:#E3F2FD;color:#1565C0;border-color:#64B5F6}
.alert-card{background:#FFF8E6;border:1px solid #F0C040;border-radius:10px;padding:11px 16px;margin-bottom:8px;font-size:13px;color:#7A5500;display:flex;align-items:center;gap:10px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-wrap{background:white;border:1px solid #EBEBEB;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.chart-title{font-size:13px;font-weight:600;color:#1A1A1A;margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:11px;color:#888}
.legend span{display:flex;align-items:center;gap:5px}
.leg-sq{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.empty{text-align:center;padding:2rem;color:#CCC;font-size:13px}
.loading{text-align:center;padding:2rem;color:#CCC;font-size:13px}
.error-msg{background:#FDE8E8;border:1px solid #F5B7B7;border-radius:10px;padding:14px 18px;color:#8B1A1A;font-size:13px;margin-bottom:8px;line-height:1.6}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="dash">
  <div class="topbar">
    <div>
      <h1>🍰 Dashboard Pâtisserie</h1>
      <div class="date" id="today-date"></div>
    </div>
    <button onclick="loadOrders()" class="btn-refresh">↻ Actualiser</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Aujourd'hui</div><div class="stat-val coral" id="s-today">—</div></div>
    <div class="stat"><div class="stat-label">Cette semaine</div><div class="stat-val" id="s-week">—</div></div>
    <div class="stat"><div class="stat-label">En cours</div><div class="stat-val" id="s-encours">—</div></div>
    <div class="stat"><div class="stat-label">CA semaine</div><div class="stat-val" id="s-ca">—</div></div>
  </div>

  <div class="section">
    <div class="section-title">⚠ Alertes</div>
    <div id="alerts-list"><div class="loading">Chargement...</div></div>
  </div>

  <div class="section">
    <div class="section-title">📅 Commandes du jour</div>
    <div id="today-list"><div class="loading">Chargement...</div></div>
  </div>

  <div class="section">
    <div class="section-title">📋 Toutes les commandes</div>
    <div id="all-list"><div class="loading">Chargement...</div></div>
  </div>

  <div class="section">
    <div class="section-title">📊 Statistiques</div>
    <div class="charts-grid">
      <div class="chart-wrap">
        <div class="chart-title">Commandes par produit</div>
        <div class="legend" id="leg1"></div>
        <div style="position:relative;height:180px"><canvas id="chart1"></canvas></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Statut des commandes</div>
        <div class="legend" id="leg2"></div>
        <div style="position:relative;height:180px"><canvas id="chart2"></canvas></div>
      </div>
    </div>
    <div class="chart-wrap" style="margin-top:12px">
      <div class="chart-title">Commandes par jour cette semaine</div>
      <div style="position:relative;height:160px"><canvas id="chart3"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjNhZDuFI4aS7kmkzxuyHQExyCDnm-HQBlo1C_Hoe0gfjdxUecHELKU6-IHF3dn70qsg/exec";

const PRIX = {
  "Tarte aux fraises":4.5,"Mille-feuille":4,"Éclair au chocolat":3.5,
  "Paris-Brest":4.5,"Opéra":5,"Saint-Honoré":5.5
};

let orders=[], chart1, chart2, chart3;

function getTodayStr(){return new Date().toISOString().split("T")[0];}

function getWeekDates(){
  const now=new Date(), day=now.getDay()||7;
  const mon=new Date(now); mon.setDate(now.getDate()-day+1);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return{start:mon.toISOString().split("T")[0],end:sun.toISOString().split("T")[0]};
}

function statusClass(s){return s==="En cours"?"encours":s==="Prêt"?"pret":"livre";}
function formatDate(d){return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}

async function loadOrders(){
  try{
    const res=await fetch(APPS_SCRIPT_URL+"?action=getOrders");
    const data=await res.json();
    orders=data.filter(r=>r[1]&&r[1]!=="").map((row,i)=>({
      id:i, dateCommande:row[0]||"", name:row[1]||"", phone:row[2]||"",
      date:row[3]||"", time:row[4]||"", product:row[5]||"",
      qty:parseInt(row[6])||1, type:row[7]||"catalogue",
      address:row[8]||"", status:row[9]||"En cours", row:i+2
    }));
    refreshDashboard();
  }catch(e){
    document.getElementById("all-list").innerHTML=
      '<div class="error-msg">⚠ Impossible de charger les données.<br>Vérifiez que le Apps Script est bien déployé et que l\'accès est public.</div>';
    document.getElementById("today-list").innerHTML="";
    document.getElementById("alerts-list").innerHTML='<div class="empty">—</div>';
  }
}

async function updateStatus(rowNum,newStatus){
  try{
    await fetch(APPS_SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify({action:"updateStatus",row:rowNum,status:newStatus})
    });
  }catch(e){console.error("Erreur statut",e);}
}

function buildCard(o,container){
  const prix=(PRIX[o.product]||0)*o.qty;
  const d=document.createElement("div");
  d.className="order-card";
  d.innerHTML=`
    <div class="order-left">
      <div class="order-time">${o.time||"—"}</div>
      <div class="order-date">${formatDate(o.date)}</div>
    </div>
    <div class="order-info">
      <div class="order-name">${o.name}</div>
      <div class="order-prod">${o.product} × ${o.qty}${prix?" · "+prix+"€":""}${o.address?" · 📍"+o.address:""}</div>
    </div>
    <select class="status-sel ${statusClass(o.status)}" data-row="${o.row}">
      <option${o.status==="En cours"?" selected":""}>En cours</option>
      <option${o.status==="Prêt"?" selected":""}>Prêt</option>
      <option${o.status==="Livré"?" selected":""}>Livré</option>
    </select>`;
  container.appendChild(d);
  d.querySelector("select").addEventListener("change",async function(){
    const ord=orders.find(x=>x.row===parseInt(this.dataset.row));
    if(ord) ord.status=this.value;
    this.className="status-sel "+statusClass(this.value);
    await updateStatus(parseInt(this.dataset.row),this.value);
    refreshDashboard();
  });
}

function refreshDashboard(){
  const todayStr=getTodayStr();
  const{start,end}=getWeekDates();
  const todayOrders=orders.filter(o=>o.date===todayStr);
  const weekOrders=orders.filter(o=>o.date>=start&&o.date<=end);
  const encours=orders.filter(o=>o.status==="En cours").length;
  const ca=weekOrders.reduce((s,o)=>s+(PRIX[o.product]||0)*o.qty,0);

  document.getElementById("s-today").textContent=todayOrders.length;
  document.getElementById("s-week").textContent=weekOrders.length;
  document.getElementById("s-encours").textContent=encours;
  document.getElementById("s-ca").textContent=Math.round(ca)+"€";

  const tl=document.getElementById("today-list");
  tl.innerHTML="";
  if(!todayOrders.length) tl.innerHTML='<div class="empty">Aucune commande aujourd\'hui</div>';
  else todayOrders.forEach(o=>buildCard(o,tl));

  const al=document.getElementById("alerts-list");
  al.innerHTML="";
  const urgent=todayOrders.filter(o=>o.status==="En cours");
  if(!urgent.length) al.innerHTML='<div class="empty">Aucune alerte ✓</div>';
  else urgent.forEach(o=>{
    const d=document.createElement("div");
    d.className="alert-card";
    d.textContent=`⚠ ${o.name} — ${o.product} × ${o.qty} à ${o.time} · En cours`;
    al.appendChild(d);
  });

  const allList=document.getElementById("all-list");
  allList.innerHTML="";
  const sorted=[...orders].sort((a,b)=>a.date>b.date?1:-1);
  if(!sorted.length) allList.innerHTML='<div class="empty">Aucune commande</div>';
  else sorted.forEach(o=>buildCard(o,allList));

  updateCharts(weekOrders);
}

function updateCharts(weekOrders){
  const prodCount={};
  weekOrders.forEach(o=>{prodCount[o.product]=(prodCount[o.product]||0)+o.qty;});
  const prods=Object.keys(prodCount);
  const prodVals=prods.map(p=>prodCount[p]);
  const colors1=["#D85A30","#BA7517","#0F6E56","#533AB7","#D4537E","#185FA5"];

  const statusCount={
    "En cours":orders.filter(o=>o.status==="En cours").length,
    "Prêt":orders.filter(o=>o.status==="Prêt").length,
    "Livré":orders.filter(o=>o.status==="Livré").length,
  };
  const colors2=["#F0C040","#66BB6A","#64B5F6"];

  const{start}=getWeekDates();
  const days=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const weekDates=Array.from({length:7},(_,i)=>{
    const d=new Date(start+"T12:00:00"); d.setDate(d.getDate()+i);
    return d.toISOString().split("T")[0];
  });
  const dayVals=weekDates.map(d=>orders.filter(o=>o.date===d).length);

  document.getElementById("leg1").innerHTML=prods.map((p,i)=>
    `<span><span class="leg-sq" style="background:${colors1[i%colors1.length]}"></span>${p}</span>`).join("");
  document.getElementById("leg2").innerHTML=Object.keys(statusCount).map((s,i)=>
    `<span><span class="leg-sq" style="background:${colors2[i]}"></span>${s} (${statusCount[s]})</span>`).join("");

  const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

  if(chart1) chart1.destroy();
  chart1=new Chart(document.getElementById("chart1"),{
    type:"bar",
    data:{labels:prods,datasets:[{data:prodVals,backgroundColor:colors1,borderRadius:4}]},
    options:{...opts,scales:{x:{ticks:{font:{size:10}}},y:{ticks:{stepSize:1}}}}
  });

  if(chart2) chart2.destroy();
  chart2=new Chart(document.getElementById("chart2"),{
    type:"doughnut",
    data:{labels:Object.keys(statusCount),datasets:[{data:Object.values(statusCount),backgroundColor:colors2,borderWidth:2}]},
    options:{...opts,cutout:"65%"}
  });

  if(chart3) chart3.destroy();
  chart3=new Chart(document.getElementById("chart3"),{
    type:"bar",
    data:{labels:days,datasets:[{data:dayVals,backgroundColor:"#D85A30",borderRadius:4,label:"Commandes"}]},
    options:{...opts,scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1}}}}
  });
}

document.getElementById("today-date").textContent=new Date().toLocaleDateString("fr-FR",{
  weekday:"long",day:"numeric",month:"long",year:"numeric"
});

loadOrders();
setInterval(loadOrders,60000);
</script>
</body>
</html>
